version: 2

project_name: grove

builds:
  - id: gw
    dir: .
    main: ./main.go
    binary: gw
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/nicksenap/grove/cmd.Version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "gw_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: grove
    repository:
      owner: nicksenap
      name: homebrew-grove
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/nicksenap/grove
    description: "Git Worktree Workspace Orchestrator"
    license: MIT
    install: |
      bin.install "gw"
    test: |
      assert_match version.to_s, shell_output("#{bin}/gw --version")
