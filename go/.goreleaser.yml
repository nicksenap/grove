version: 2

project_name: grove-go

builds:
  - id: gw
    dir: .
    main: ./main.go
    binary: gw
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/nicksenap/grove/cmd.Version={{ .Version }}-go

archives:
  - id: default
    formats: [tar.gz]
    name_template: "gw_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - name: grove-go
    repository:
      owner: nicksenap
      name: homebrew-grove
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/nicksenap/grove
    description: "Git Worktree Workspace Orchestrator (Go)"
    binaries:
      - gw
