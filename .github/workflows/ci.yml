name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format
        run: uv run ruff format --check src/ tests/

      - name: Test
        run: uv run pytest tests/ -v
